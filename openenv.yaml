name: "smarthome_env"
version: "1.0.0"
description: "Smart Home Energy Optimizer"
type: "http"
http:
  port: 7860
  endpoints:
    reset: "/reset"
    step: "/step"
    state: "/state"
    tasks: "/tasks"
tasks:
  - id: "easy"
    name: "Easy Energy Saver"
    description: "Turn off lights during the day."
    difficulty: "easy"
    max_steps: 8
  - id: "medium"
    name: "HVAC Eco Mode"
    description: "Set HVAC to Eco Mode (78F)."
    difficulty: "medium"
    max_steps: 8
  - id: "hard"
    name: "Peak Shaving"
    description: "Peak shaving: HVAC to 78F and Pool Pump off."
    difficulty: "hard"
    max_steps: 8
